name: Reconstruct spine dashboard

on:
  push:
    paths:
      - 'spine-doctors-dashboard/.import/dashboard.html.xz.hex.part11'
      - '.github/workflows/reconstruct-spine-dashboard.yml'
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reconstruct:
    if: github.event_name != 'issues' || github.event.issue.title == 'trigger: reconstruct spine dashboard'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and verify dashboard
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p spine-doctors-dashboard
          cat spine-doctors-dashboard/.import/dashboard.html.xz.hex.part* \
            | xxd -r -p \
            | xz --decompress --stdout \
            > spine-doctors-dashboard/index.html
          echo "d84857f4f94888fb49efa97d61cb6a3f76b105c69ab0abf0ceee92c66856ef8e  spine-doctors-dashboard/index.html" \
            | sha256sum --check -
          python - <<'PY'
          from pathlib import Path
          text = (
              "# 전국 척추 의료진 222명 통합분석 대시보드\n\n"
              "단일 HTML 파일로 실행되는 전국 주요 척추 의료진 222명 통합분석 대시보드입니다.\n\n"
              "## 실행\n\n"
              "`index.html`을 최신 웹 브라우저에서 엽니다.\n\n"
              "## 주요 기능\n\n"
              "- 데이터 신뢰도, 진료과, 병원, 나이대, 졸업연대, 전문분야 차트\n"
              "- 차트 클릭 시 해당 의료진 목록 표시\n"
              "- 검색 및 다중 필터\n"
              "- 전체 의료진 상세 테이블\n"
              "- 검증 필요 의료진 분리\n"
              "- 원본 기초 데이터 탭 및 CSV 다운로드\n\n"
              "## 주의\n\n"
              "대시보드에 포함된 나이·학력·소속·전문분야 일부는 추정 또는 보조자료 기반입니다. "
              "실제 진료 선택 전 병원 공식 프로필을 다시 확인해야 합니다.\n"
          )
          Path("spine-doctors-dashboard/README.md").write_text(text, encoding="utf-8")
          PY
          rm -rf spine-doctors-dashboard/.import

      - name: Commit reconstructed dashboard
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "RubyRio"
          git config user.email "kidong.nam@gmail.com"
          git add -A spine-doctors-dashboard
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "feat: add interactive dashboard for 222 spine specialists"
          git push
