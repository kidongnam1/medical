name: Reconstruct spine dashboard

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reconstruct:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.title == 'trigger: reconstruct spine dashboard')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main and source archive
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin main
          git checkout -B main FETCH_HEAD
          git fetch --depth=1 origin 7d4b152e5f981b873e391944b7dbcb3ceca86e76

      - name: Reconstruct and verify dashboard
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_COMMIT="7d4b152e5f981b873e391944b7dbcb3ceca86e76"
          mkdir -p spine-doctors-dashboard
          : > /tmp/dashboard.hex
          for i in $(seq -w 0 10); do
            git show "${SOURCE_COMMIT}:spine-doctors-dashboard/.import/dashboard.html.xz.hex.part${i}" \
              | head -c 6000 >> /tmp/dashboard.hex
          done
          git show "${SOURCE_COMMIT}:spine-doctors-dashboard/.import/dashboard.html.xz.hex.part11" \
            >> /tmp/dashboard.hex
          test "$(wc -c < /tmp/dashboard.hex)" -eq 71536
          xxd -r -p /tmp/dashboard.hex > /tmp/dashboard.html.xz
          echo "844ab5ce0cc5966e11f40f1ed5454d9e32761a23f774922165f07aeea2716368  /tmp/dashboard.html.xz" \
            | sha256sum --check -
          xz --decompress --stdout /tmp/dashboard.html.xz \
            > spine-doctors-dashboard/index.html
          echo "d84857f4f94888fb49efa97d61cb6a3f76b105c69ab0abf0ceee92c66856ef8e  spine-doctors-dashboard/index.html" \
            | sha256sum --check -
          python - <<'PY'
          from pathlib import Path
          text = (
              "# 전국 척추 의료진 222명 통합분석 대시보드\n\n"
              "단일 HTML 파일로 실행되는 전국 주요 척추 의료진 222명 통합분석 대시보드입니다.\n\n"
              "## 실행\n\n"
              "`index.html`을 최신 웹 브라우저에서 엽니다.\n\n"
              "## 주요 기능\n\n"
              "- 데이터 신뢰도, 진료과, 병원, 나이대, 졸업연대, 전문분야 차트\n"
              "- 차트 클릭 시 해당 의료진 목록 표시\n"
              "- 검색 및 다중 필터\n"
              "- 전체 의료진 상세 테이블\n"
              "- 검증 필요 의료진 분리\n"
              "- 원본 기초 데이터 탭 및 CSV 다운로드\n\n"
              "## 주의\n\n"
              "대시보드에 포함된 나이·학력·소속·전문분야 일부는 추정 또는 보조자료 기반입니다. "
              "실제 진료 선택 전 병원 공식 프로필을 다시 확인해야 합니다.\n"
          )
          Path("spine-doctors-dashboard/README.md").write_text(text, encoding="utf-8")
          PY

      - name: Commit reconstructed dashboard
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "RubyRio"
          git config user.email "kidong.nam@gmail.com"
          git add -f spine-doctors-dashboard/index.html
          git add spine-doctors-dashboard/README.md
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "feat: add verified spine specialists dashboard HTML"
          git push origin HEAD:main
